<div class="container py-5" style="min-height: 80vh;">
  <div *ngIf="isLoading" class="text-center py-5 text-muted">
    <div class="spinner-border text-primary mb-3" role="status"></div>
    <h5>Đang tải thông tin sản phẩm...</h5>
  </div>

  <div *ngIf="!isLoading && product" class="row bg-white p-4 rounded-4 shadow-sm border">

    <div class="col-md-5 text-center mb-4 mb-md-0">
      <div class="border rounded-4 overflow-hidden shadow-sm" style="height: 400px; background-color: #f8f9fa;">
        <img *ngIf="product.image_url" [src]="product.image_url" style="width: 100%; height: 100%; object-fit: contain;" alt="Product">
        <i *ngIf="!product.image_url" class="bi bi-image text-muted d-flex justify-content-center align-items-center h-100" style="font-size: 5rem;"></i>
      </div>
    </div>

    <div class="col-md-7 d-flex flex-column justify-content-between">
      <div>
        <span class="badge bg-danger mb-2">HOT</span>
        <h2 class="fw-bold text-dark mb-3">{{ product.product_name }}</h2>

        <div class="bg-light p-3 rounded-3 mb-4">
          <h3 class="text-danger fw-bold m-0">{{ product.price | number }} ₫</h3>
        </div>

        <div class="mb-4">
          <h6 class="fw-bold text-muted">Mô tả sản phẩm:</h6>
          <p>Sản phẩm chính hãng. (Bạn có thể in thêm các thông tin variants, mô tả chi tiết ở đây...)</p>
        </div>
      </div>

      <div class="d-flex gap-3 mt-auto">
        <button class="btn btn-primary btn-lg flex-grow-1 fw-bold rounded-pill shadow-sm">
          <i class="bi bi-cart-plus me-2"></i> Thêm vào giỏ hàng
        </button>

        <button class="btn btn-outline-primary btn-lg fw-bold rounded-pill px-4"
                *ngIf="!authService.isAdmin()"
                (click)="askAboutProduct()">
          <i class="bi bi-chat-dots-fill me-2"></i> Tư vấn
        </button>
      </div>

    </div>
  </div>

  <div *ngIf="!isLoading && !product" class="text-center py-5 text-muted">
    <i class="bi bi-box-seam" style="font-size: 4rem;"></i>
    <h4 class="mt-3">Sản phẩm không tồn tại hoặc đã bị xóa.</h4>
    <a routerLink="/" class="btn btn-primary mt-3 rounded-pill">Quay lại trang chủ</a>
  </div>
</div>
