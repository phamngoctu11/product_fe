<div class="container mt-5 pt-5 mb-5 d-flex justify-content-center">
  <div class="card shadow-lg border-0 rounded-4 success-card pop-in" style="max-width: 500px; width: 100%;">
    <div class="card-body p-5 text-center">

      <div class="mb-4">
        <div *ngIf="isSuccess" class="icon-container success mb-4 shadow-sm">
          <i class="bi bi-check-lg"></i>
        </div>
        <div *ngIf="!isSuccess" class="icon-container danger mb-4 shadow-sm">
          <i class="bi bi-x-lg"></i>
        </div>
      </div>

      <h3 class="fw-bold mb-2" [ngClass]="isSuccess ? 'text-success' : 'text-danger'">
        {{ isSuccess ? 'Giao dịch thành công!' : 'Giao dịch thất bại!' }}
      </h3>

      <p class="text-muted fs-6 mb-4">{{ message }}</p>

      <div class="bg-light p-4 rounded-4 mb-4 text-start border shadow-sm" *ngIf="orderId">
        <div class="d-flex justify-content-between align-items-center">
          <span class="fw-semibold text-secondary"><i class="bi bi-receipt-cutoff me-2"></i>Mã đơn hàng:</span>
          <span class="fw-bold text-dark fs-5">#{{ orderId }}</span>
        </div>
      </div>

      <div class="d-grid gap-2 mt-2">
        <button class="btn btn-primary rounded-pill fw-bold py-3 shadow-sm d-flex justify-content-center align-items-center" (click)="goHome()">
          <i class="bi bi-house-door me-2 fs-5"></i> Trở về Trang chủ
        </button>
      </div>

    </div>
  </div>
</div>
