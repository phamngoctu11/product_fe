<h2 mat-dialog-title class="bg-primary text-white p-3 mb-0">Lịch sử đơn hàng</h2>
    <mat-dialog-content class="mt-3">
      <div *ngIf="orders.length === 0" class="text-center py-4">
        <p>Bạn chưa có đơn hàng nào.</p>
      </div>
      <div *ngFor="let order of orders" class="card mb-3 p-3 shadow-sm">
        <div class="d-flex justify-content-between border-bottom pb-2 mb-2">
          <span
            ><strong>Ngày đặt:</strong> {{ order.startOrderTime | date: 'dd/MM/yyyy HH:mm' }}</span
          >
          <span class="badge bg-info text-dark">{{ order.status }}</span>
        </div>
        <table class="table table-sm">
          <thead>
            <tr>
              <th style="width:40%">Sản phẩm</th>
              <th style="width:20%">SL</th>
              <th style="width:40%">Thành tiền</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of order.items">
              <td>{{ item.productName }}</td>
              <td>{{ item.quantity }}</td>
              <td>{{ item.quantity * item.price | number }} đ</td>
            </tr>
          </tbody>
        </table>
        <div class="text-end text-danger fw-bold">Tổng: {{ order.finalPrice | number }} đ</div>
      </div>
    </mat-dialog-content>
    <mat-dialog-actions align="end" class="p-3">
      <button class="btn btn-secondary" mat-dialog-close>Đóng</button>
    </mat-dialog-actions>
