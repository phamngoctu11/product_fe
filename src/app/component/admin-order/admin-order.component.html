<div class="container-fluid p-4 admin-order-page">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="d-flex align-items-center gap-3">
      <div class="bg-primary bg-opacity-10 text-primary icon-shape page-icon shadow-sm">
        <i class="bi bi-box-seam fs-3"></i>
      </div>
      <h2 class="fw-bold text-dark mb-0">Đơn hàng chờ duyệt</h2>
    </div>
    <button class="btn btn-outline-primary rounded-pill px-4 shadow-sm" (click)="loadPendingOrders()" [disabled]="isLoading">
      <i class="bi bi-arrow-clockwise me-2"></i> Làm mới
    </button>
  </div>

  <div class="card shadow-sm border-0 rounded-4 overflow-hidden hover-elevate">
    <div class="card-body p-0">

      <div *ngIf="isLoading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Đang tải dữ liệu...</p>
      </div>

      <div *ngIf="!isLoading && pendingOrders.length === 0" class="text-center py-5">
        <i class="bi bi-inbox fs-1 text-muted"></i>
        <h5 class="mt-3 text-muted">Không có đơn hàng nào đang chờ duyệt.</h5>
      </div>

      <div class="table-responsive" *ngIf="!isLoading && pendingOrders.length > 0">
        <table class="table table-hover table-custom align-middle mb-0">
          <thead class="table-light text-uppercase small">
            <tr>
              <th class="ps-4">Mã Đơn</th>
              <th>Khách hàng</th>
              <th>Thanh toán</th>
              <th>Tổng tiền</th>
              <th>Ghi chú</th>
              <th class="text-center pe-4">Thao tác</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let order of pendingOrders">
              <td class="ps-4 fw-bold">#{{ order.id }}</td>
              <td>{{ order.customerName || 'Khách Vãng Lai' }}</td>

            <td class="text-uppercase">
              <span class="badge rounded-pill px-3 py-2"
                    [ngClass]="order.paymentMethod === 'ONLINE' ? 'bg-success bg-opacity-10 text-success border border-success border-opacity-25' : 'bg-warning bg-opacity-10 text-warning border border-warning border-opacity-25'">
                <i class="bi" [ngClass]="order.paymentMethod === 'ONLINE' ? 'bi-credit-card' : 'bi-cash-coin'"></i> {{ order.paymentMethod }}
                </span>
              </td>

            <td class="fw-bold text-danger fs-6">{{ order.totalPrice | number }}đ</td>

              <td>
              <span *ngIf="order.note" class="text-danger fw-medium bg-danger bg-opacity-10 px-2 py-1 rounded-3" title="{{ order.note }}">
                  <i class="bi bi-exclamation-circle-fill me-1"></i> {{ order.note }}
                </span>
              <span *ngIf="!order.note" class="text-muted small fst-italic">Không có</span>
              </td>

              <td class="text-center pe-4">
              <button class="btn btn-sm btn-primary rounded-3 px-3 me-2 shadow-sm"
                        (click)="approveOrder(order)"
                        [disabled]="isLoading" title="Duyệt đơn hàng">
                <i class="bi bi-check-circle me-1"></i> Duyệt
                </button>
              <button class="btn btn-sm btn-outline-danger rounded-3 px-3 shadow-sm"
                        (click)="rejectOrder(order.id)"
                        [disabled]="isLoading" title="Từ chối đơn hàng">
                <i class="bi bi-x-circle me-1"></i> Từ chối
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>
