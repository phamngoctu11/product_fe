<nav *ngIf="canShow" class="app-pagination" [class.compact]="compact" aria-label="Phân trang">
  <div class="pagination-summary">
    <span>Hiển thị</span>
    <strong>{{ startItem | number }}-{{ endItem | number }}</strong>
    <span>/ {{ totalElements | number }} bản ghi</span>
  </div>

  <div class="pagination-controls">
    <button
      type="button"
      class="pagination-arrow"
      [disabled]="disabled || currentPage <= 0"
      (click)="goToPage(currentPage - 1)"
      aria-label="Trang trước">
      <i class="bi bi-chevron-left"></i>
    </button>

    <ng-container *ngFor="let page of visiblePages; let i = index">
      <span *ngIf="shouldShowGap(i)" class="pagination-gap">...</span>
      <button
        type="button"
        class="pagination-page"
        [class.active]="page === currentPage"
        [disabled]="disabled"
        (click)="goToPage(page)">
        {{ page + 1 }}
      </button>
    </ng-container>

    <button
      type="button"
      class="pagination-arrow"
      [disabled]="disabled || currentPage + 1 >= totalPages"
      (click)="goToPage(currentPage + 1)"
      aria-label="Trang sau">
      <i class="bi bi-chevron-right"></i>
    </button>
  </div>

  <label *ngIf="showPageSize" class="pagination-size">
    <span>Mỗi trang</span>
    <select
      class="form-select form-select-sm"
      [ngModel]="pageSize"
      [disabled]="disabled"
      (ngModelChange)="changePageSize($event)">
      <option *ngFor="let option of pageSizeOptions" [ngValue]="option">
        {{ option }}
      </option>
    </select>
  </label>
</nav>
