<div class="modal-content shadow-lg border-0 rounded-4 overflow-hidden">
  <div class="modal-header bg-primary bg-gradient text-white border-0 p-4">
    <h5 class="modal-title fw-bold m-0 fs-4">
      <i class="bi bi-palette me-2"></i>Cài đặt giao diện
    </h5>
    <button type="button" class="btn-close btn-close-white" (click)="close()"></button>
  </div>

  <div class="modal-body p-4">
    <div class="mb-4">
      <label class="form-label fw-bold text-secondary mb-3 small text-uppercase" style="letter-spacing: 0.5px;">Màu nền tùy chỉnh</label>
      <div class="d-flex align-items-center gap-3 bg-light p-3 rounded-4 border color-picker-box">
        <input type="color"
               class="form-control form-control-color border-0 p-1 shadow-sm rounded-circle"
               style="width: 50px; height: 50px; cursor: pointer;"
               [(ngModel)]="selectedColor"
               (ngModelChange)="applyColor($event)"
               title="Chọn màu tùy chỉnh">
        <span class="text-muted fw-medium small">Nhấp vào ô tròn bên trái để tự pha màu theo ý thích</span>
      </div>
    </div>

    <hr class="text-muted opacity-10 my-4">

    <div class="mb-3">
      <label class="form-label fw-bold text-secondary mb-3 small text-uppercase" style="letter-spacing: 0.5px;">Màu gợi ý</label>
      <div class="d-flex flex-wrap gap-3 justify-content-center bg-light p-4 rounded-4 border">
        @for (color of presetColors; track color) {
          <button class="btn rounded-circle shadow-sm color-btn"
                  [style.background-color]="color"
                  [class.border-primary]="selectedColor === color"
                  [class.border-2]="selectedColor === color"
                  [class.border]="selectedColor !== color"
                  style="width: 50px; height: 50px; border-color: rgba(0,0,0,0.1) !important;"
                  (click)="applyColor(color)">
            <i class="bi bi-check-lg fs-5"
               [ngClass]="color === '#212529' ? 'text-white' : 'text-primary'"
               *ngIf="selectedColor === color">
            </i>
          </button>
        }
      </div>
    </div>
  </div>

  <div class="modal-footer bg-white border-top p-4">
    <button class="btn btn-outline-danger rounded-pill px-4 fw-bold shadow-sm me-auto" (click)="resetColor()">
      <i class="bi bi-arrow-counterclockwise me-1"></i>Khôi phục mặc định
    </button>
    <button class="btn btn-primary rounded-pill px-5 fw-bold shadow-sm" (click)="close()">Hoàn tất</button>
  </div>
</div>
