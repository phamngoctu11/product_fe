<style>
  .auth-card { border-radius: 1.5rem; transition: transform 0.3s ease, box-shadow 0.3s ease; }
  .auth-card:hover { box-shadow: 0 1rem 3rem rgba(0,0,0,.15)!important; }
  .form-control-custom { border-radius: 0.75rem; padding: 0.75rem 1rem; background-color: #f8f9fa; border: 1px solid #e9ecef; transition: all 0.2s; }
  .form-control-custom:focus { background-color: #fff; border-color: #86b7fe; box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25); }
  .btn-custom { border-radius: 0.75rem; padding: 0.75rem; font-weight: 600; letter-spacing: 0.5px; transition: all 0.3s; }
  .input-group-text-custom { border-radius: 0.75rem 0 0 0.75rem; background-color: #f8f9fa; border: 1px solid #e9ecef; border-right: none; color: #6c757d; }
  .form-control-custom-group { border-radius: 0 0.75rem 0.75rem 0; border-left: none; padding-left: 0; }
  .form-control-custom-group:focus { border-color: #e9ecef; box-shadow: none; background-color: #f8f9fa; }
</style>

<div class="container mt-5 mb-5" style="animation: fadeIn 0.5s;">
  <div class="row justify-content-center">

    <div [ngClass]="isLoginMode ? 'col-md-5 col-lg-4' : 'col-md-8 col-lg-7'" class="card shadow-lg border-0 auth-card p-4 p-md-5 bg-white">

      <ng-container *ngIf="isLoginMode">
        <div class="text-center mb-4">
          <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex justify-content-center align-items-center mb-3 shadow-sm" style="width: 70px; height: 70px;">
            <i class="bi bi-person-circle fs-1"></i>
          </div>
          <h3 class="fw-bold text-dark mb-1">Đăng Nhập</h3>
          <p class="text-muted small">Chào mừng bạn quay trở lại!</p>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Tên đăng nhập</label>
          <div class="input-group">
            <span class="input-group-text input-group-text-custom"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control form-control-custom form-control-custom-group" [(ngModel)]="loginData.username" placeholder="Nhập tên đăng nhập..." />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Mật khẩu</label>
          <div class="input-group">
            <span class="input-group-text input-group-text-custom"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control form-control-custom form-control-custom-group" [(ngModel)]="loginData.password" placeholder="Nhập mật khẩu..." (keyup.enter)="handleLogin()" />
          </div>
        </div>
        <button class="btn btn-primary w-100 btn-custom shadow-sm mb-3" (click)="handleLogin()">
          <i class="bi bi-box-arrow-in-right me-2"></i> Đăng nhập
        </button>

        <div class="text-center mt-3">
          <span class="text-muted">Chưa có tài khoản?</span>
          <a href="javascript:void(0)" class="text-primary text-decoration-none fw-bold ms-1" style="transition: color 0.2s;" (click)="toggleMode()">Đăng ký ngay</a>
        </div>
      </ng-container>

      <ng-container *ngIf="!isLoginMode">
        <div class="text-center mb-4">
          <div class="bg-success bg-opacity-10 text-success rounded-circle d-inline-flex justify-content-center align-items-center mb-3 shadow-sm" style="width: 70px; height: 70px;">
            <i class="bi bi-person-plus-fill fs-1"></i>
          </div>
          <h3 class="fw-bold text-dark mb-1">Tạo Tài Khoản Mới</h3>
          <p class="text-muted small">Tham gia cùng chúng tôi ngay hôm nay!</p>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Họ đệm <span class="text-danger">*</span></label>
            <input type="text" class="form-control form-control-custom" [(ngModel)]="registerData.firstname" placeholder="Vd: Nguyễn Văn" />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Tên <span class="text-danger">*</span></label>
            <input type="text" class="form-control form-control-custom" [(ngModel)]="registerData.lastname" placeholder="Vd: A" />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Tên đăng nhập <span class="text-danger">*</span></label>
          <input type="text" class="form-control form-control-custom" [(ngModel)]="registerData.username" placeholder="Nhập tên đăng nhập viết liền không dấu" />
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Mật khẩu <span class="text-danger">*</span></label>
            <input type="password" class="form-control form-control-custom" [(ngModel)]="registerData.password" placeholder="Tạo mật khẩu" />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Xác nhận mật khẩu <span class="text-danger">*</span></label>
            <input type="password" class="form-control form-control-custom" [(ngModel)]="registerData.confirmPassword" placeholder="Nhập lại mật khẩu" />
          </div>
        </div>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label fw-semibold">Giới tính</label>
            <select class="form-select form-control-custom" [(ngModel)]="registerData.gender">
              <option value="Nam">Nam</option>
              <option value="Nữ">Nữ</option>
              <option value="Khác">Khác</option>
            </select>
          </div>
          <div class="col-md-8 mb-3">
            <label class="form-label fw-semibold">Số điện thoại <span class="text-danger">*</span></label>
            <input type="text" class="form-control form-control-custom" [(ngModel)]="registerData.phone" placeholder="Nhập số điện thoại" />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Ngày sinh</label>
          <input type="date" class="form-control form-control-custom" [(ngModel)]="registerData.birth" />
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Địa chỉ</label>
          <textarea class="form-control form-control-custom" rows="2" [(ngModel)]="registerData.address" placeholder="Nhập địa chỉ nhận hàng"></textarea>
        </div>

        <button class="btn btn-success w-100 btn-custom shadow-sm mb-3" (click)="handleRegister()">
          <i class="bi bi-check-circle me-2"></i> Đăng Ký Tài Khoản
        </button>

        <div class="text-center mt-3">
          <span class="text-muted">Đã có tài khoản?</span>
          <a href="javascript:void(0)" class="text-success text-decoration-none fw-bold ms-1" style="transition: color 0.2s;" (click)="toggleMode()">Đăng nhập</a>
        </div>
      </ng-container>

    </div>
  </div>
</div>
