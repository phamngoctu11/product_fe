<div class="container mt-5 mb-5">
  <div class="row justify-content-center">

    <div [ngClass]="isLoginMode ? 'col-md-4' : 'col-md-6'" class="card shadow p-4">

      <ng-container *ngIf="isLoginMode">
        <h3 class="text-center mb-4 text-primary fw-bold">Đăng Nhập</h3>
        <div class="mb-3">
          <label class="form-label fw-semibold">Tên đăng nhập</label>
          <input type="text" class="form-control" [(ngModel)]="loginData.username" placeholder="Nhập tên đăng nhập..." />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Mật khẩu</label>
          <input type="password" class="form-control" [(ngModel)]="loginData.password" placeholder="Nhập mật khẩu..." />
        </div>
        <button class="btn btn-primary w-100 py-2 fw-bold" (click)="handleLogin()">Đăng nhập</button>

        <div class="text-center mt-3">
          <span class="text-muted">Chưa có tài khoản?</span>
          <a href="javascript:void(0)" class="text-primary text-decoration-none fw-bold ms-1" (click)="toggleMode()">Đăng ký ngay</a>
        </div>
      </ng-container>

      <ng-container *ngIf="!isLoginMode">
        <h3 class="text-center mb-4 text-success fw-bold">Tạo Tài Khoản Mới</h3>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Họ đệm <span class="text-danger">*</span></label>
            <input type="text" class="form-control" [(ngModel)]="registerData.firstname" />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Tên <span class="text-danger">*</span></label>
            <input type="text" class="form-control" [(ngModel)]="registerData.lastname" />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Tên đăng nhập <span class="text-danger">*</span></label>
          <input type="text" class="form-control" [(ngModel)]="registerData.username" />
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Mật khẩu <span class="text-danger">*</span></label>
            <input type="password" class="form-control" [(ngModel)]="registerData.password" />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-semibold">Xác nhận mật khẩu <span class="text-danger">*</span></label>
            <input type="password" class="form-control" [(ngModel)]="registerData.confirmPassword" />
          </div>
        </div>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label fw-semibold">Giới tính</label>
            <select class="form-select" [(ngModel)]="registerData.gender">
              <option value="Nam">Nam</option>
              <option value="Nữ">Nữ</option>
              <option value="Khác">Khác</option>
            </select>
          </div>
          <div class="col-md-8 mb-3">
            <label class="form-label fw-semibold">Số điện thoại <span class="text-danger">*</span></label>
            <input type="text" class="form-control" [(ngModel)]="registerData.phone" />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Ngày sinh</label>
          <input type="date" class="form-control" [(ngModel)]="registerData.birth" />
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Địa chỉ</label>
          <textarea class="form-control" rows="2" [(ngModel)]="registerData.address"></textarea>
        </div>

        <button class="btn btn-success w-100 py-2 fw-bold" (click)="handleRegister()">Đăng Ký</button>

        <div class="text-center mt-3">
          <span class="text-muted">Đã có tài khoản?</span>
          <a href="javascript:void(0)" class="text-success text-decoration-none fw-bold ms-1" (click)="toggleMode()">Đăng nhập</a>
        </div>
      </ng-container>

    </div>
  </div>
</div>
