<style>
  .product-card { transition: transform 0.3s ease, box-shadow 0.3s ease; border-radius: 1.25rem; overflow: hidden; border: none; }
  .product-card:hover { transform: translateY(-5px); box-shadow: 0 1rem 3rem rgba(0,0,0,.12)!important; }
  .product-img-wrapper { position: relative; padding-top: 100%; overflow: hidden; background-color: #f8f9fa; }
  .product-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
  .product-card:hover .product-img { transform: scale(1.05); }
  .tag-badge { background-color: rgba(13, 110, 253, 0.1); color: #0d6efd; border: 1px solid rgba(13, 110, 253, 0.2); font-weight: 600; }
</style>

<div class="container mt-4 mb-5" style="animation: fadeIn 0.4s;">
  <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
    <div class="d-flex align-items-center gap-3">
      <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex justify-content-center align-items-center shadow-sm" style="width: 56px; height: 56px;">
        <i class="bi bi-shop fs-3"></i>
      </div>
      <h2 class="m-0 fw-bold text-dark">Cửa Hàng</h2>
    </div>
    <button class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm d-flex align-items-center" (click)="openProductDialog()" *ngIf="isAdmin">
      <i class="bi bi-plus-circle me-2 fs-5"></i> Thêm Sản Phẩm
    </button>
  </div>

  <!-- Filter Section -->
  <div class="card shadow-sm border-0 rounded-4 mb-4">
    <div class="card-body p-4">
      <div class="row g-3">
        <div class="col-md-4 col-lg-3">
          <label class="form-label small fw-bold text-muted text-uppercase" style="letter-spacing: 0.5px;">Mức giá tối đa</label>
          <div class="input-group shadow-sm rounded-pill overflow-hidden border">
            <span class="input-group-text bg-light border-0"><i class="bi bi-cash-coin text-muted"></i></span>
            <input type="number" class="form-control border-0 bg-light shadow-none" placeholder="VD: 500000" [(ngModel)]="searchPrice" (ngModelChange)="filterProducts()" />
          </div>
        </div>
        <div class="col-md-8 col-lg-9">
          <label class="form-label small fw-bold text-muted text-uppercase" style="letter-spacing: 0.5px;">Tìm kiếm sản phẩm</label>
          <div class="input-group shadow-sm rounded-pill overflow-hidden border" title="Gợi ý: Thêm '#' vào đầu để lọc theo Thẻ. VD: #quanao">
            <span class="input-group-text bg-light border-0"><i class="bi bi-search text-muted"></i></span>
            <input type="text" class="form-control border-0 bg-light shadow-none" placeholder="Nhập tên sản phẩm hoặc '#hastag'..." [(ngModel)]="searchTerm" (ngModelChange)="filterProducts()" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Product Grid -->
  <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-4" *ngIf="filteredProducts.length > 0">
    @for (p of filteredProducts; track p.id) {
      <div class="col">
        <div class="card shadow-sm product-card h-100" (click)="viewProduct(p.id)" style="cursor: pointer;">
          <div class="product-img-wrapper border-bottom">
            <img *ngIf="p.image_url" [src]="p.image_url" class="product-img">
            <div *ngIf="!p.image_url" class="product-img d-flex justify-content-center align-items-center">
              <i class="bi bi-box-fill text-secondary opacity-25" style="font-size: 5rem;"></i>
            </div>

            <!-- Badge: Out of stock -->
            <div *ngIf="!p.quantity || p.quantity <= 0" class="position-absolute top-0 end-0 m-3 z-1">
              <span class="badge bg-danger rounded-pill shadow px-3 py-2">Hết hàng</span>
            </div>
          </div>

          <div class="card-body d-flex flex-column p-4">
            <h5 class="card-title fw-bold text-dark mb-2 text-truncate" [title]="p.product_name">{{ p.product_name }}</h5>

            <div class="mb-3 d-flex flex-wrap gap-2">
              <span class="badge tag-badge rounded-pill px-2 py-1" *ngIf="p.tags">{{ p.tags }}</span>
              <span class="badge bg-light text-secondary border rounded-pill px-2 py-1" *ngIf="p.variants && p.variants.length > 0">
                <i class="bi bi-tags me-1"></i>{{ p.variants.length }} loại
              </span>
            </div>

            <div class="mt-auto d-flex justify-content-between align-items-end">
              <div>
                <small class="text-muted d-block mb-1">Giá tham khảo</small>
                <h5 class="text-danger fw-bold mb-0">{{ p.price | number }}đ</h5>
              </div>
              <small class="text-muted fw-medium" *ngIf="p.quantity && p.quantity > 0">Kho: {{ p.quantity }}</small>
            </div>
          </div>

          <div class="card-footer bg-white border-top-0 p-4 pt-0">
            <div class="d-flex gap-2">
              <button class="btn btn-outline-primary fw-bold rounded-pill flex-grow-1 shadow-sm"
                      (click)="openAddToCartModal(p); $event.stopPropagation()"
                      [disabled]="!p.quantity || p.quantity <= 0">
                <i class="bi bi-cart-plus me-1"></i> Chọn Mua
              </button>

              <ng-container *ngIf="isAdmin || isStaff">
                <button class="btn btn-light border text-warning rounded-circle shadow-sm d-flex justify-content-center align-items-center" style="width: 40px; height: 40px; flex-shrink: 0;" (click)="openProductDialog(p.id); $event.stopPropagation()" title="Chỉnh sửa">
                  <i class="bi bi-pencil-square"></i>
                </button>
              </ng-container>

              <ng-container *ngIf="isAdmin">
                <button class="btn btn-light border text-danger rounded-circle shadow-sm d-flex justify-content-center align-items-center" style="width: 40px; height: 40px; flex-shrink: 0;" (click)="delete(p); $event.stopPropagation()" title="Xóa">
                  <i class="bi bi-trash"></i>
                </button>
              </ng-container>
            </div>
          </div>
        </div>
      </div>
    }
  </div>

  <!-- Empty State -->
  <div *ngIf="filteredProducts.length === 0" class="text-center py-5 my-5">
    <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex justify-content-center align-items-center mb-4" style="width: 100px; height: 100px;">
      <i class="bi bi-search text-primary fs-1"></i>
    </div>
    <h4 class="fw-bold text-dark">Không tìm thấy sản phẩm</h4>
    <p class="text-muted">Rất tiếc, không có sản phẩm nào khớp với điều kiện lọc của bạn.</p>
    <button class="btn btn-outline-primary rounded-pill px-4 mt-2 fw-bold" (click)="searchTerm = ''; searchPrice = null; filterProducts()">
      <i class="bi bi-arrow-clockwise me-2"></i> Xóa bộ lọc
    </button>
  </div>
</div>
