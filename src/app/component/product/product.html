<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="m-0">Quản lý Sản Phẩm</h2>
    <button class="btn btn-success" (click)="openProductDialog()">
      <i class="bi bi-plus-circle"></i> Thêm mới sản phẩm
    </button>
  </div>

  <div class="card shadow-sm">
    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
      <h5 class="mb-0">Danh sách sản phẩm</h5>
      <div class="input-group" style="width: 300px">
        <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
        <input
          type="text"
          class="form-control border-start-0 ps-0"
          placeholder="Tìm kiếm tên sản phẩm..."
          [(ngModel)]="searchTerm"
          (ngModelChange)="filterProducts()"
        />
      </div>
    </div>

    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-striped table-hover table-bordered mb-0 align-middle">
          <thead class="table-dark text-center">
            <tr>
              <th scope="col" style="width: 10%">ID</th>
              <th scope="col" style="width: 25%">Tên Sản Phẩm</th>
              <th scope="col" style="width: 15%">Số lượng kho</th>
              <th scope="col" style="width: 15%">Giá tiền</th>
              <th scope="col" style="width: 20%">Hành động</th>
              <th scope="col" style="width: 15%">Số lượng thêm</th>
            </tr>
          </thead>
          <tbody>
            @for (p of filteredProducts; track p.id) {
              <tr>
                <td class="text-center">{{ p.id }}</td>
                <td>{{ p.product_name }}</td>
                <td class="text-center">{{ p.quantity }}</td>
                <td class="text-center">{{ p.price | na }}</td>
                <td class="text-center">
                  <div class="btn-group" role="group">
                    <button class="btn btn-warning btn-sm" (click)="openProductDialog(p.id)">
                      <i class="bi bi-pencil"></i> 
                    </button>
                    <button class="btn btn-danger btn-sm ms-2" (click)="delete(p)">
                      <i class="bi bi-trash"></i>
                    </button>
                    <button class="btn btn-success btn-sm ms-2" (click)="onAddToCart(p.id, $index)">
                      <i class="bi bi-cart-plus"></i>
                    </button>
                  </div>
                </td>
                <td>
                  <input
                    type="number"
                    class="form-control form-control-sm mx-auto"
                    style="width: 70px"
                    min="1"
                    [(ngModel)]="addQuan[$index]"
                  />
                </td>
              </tr>
            } @empty {
              <tr>
                <td colspan="6" class="text-center py-4 text-muted">
                  Không tìm thấy dữ liệu.
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
