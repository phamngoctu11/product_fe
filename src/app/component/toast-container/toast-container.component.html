<section class="toast-container" aria-live="polite" aria-label="Thông báo hệ thống">
  <article
    *ngFor="let item of toast.messages()"
    [class]="'app-toast app-toast--' + item.type"
    role="status">
    <i class="bi toast-icon" [ngClass]="icon(item.type)" aria-hidden="true"></i>
    <p>{{ item.message }}</p>
    <button type="button" aria-label="Đóng thông báo" (click)="toast.dismiss(item.id)">
      <i class="bi bi-x-lg" aria-hidden="true"></i>
    </button>
    <span *ngIf="item.duration > 0" class="toast-progress" [style.animation-duration.ms]="item.duration"></span>
  </article>
</section>
